<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bassketball Scoreboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="flex">
            <div class="title">
                <h2>HOME</h2>
                <p id="home-score">0</p>
                <button onclick="addPoints('home', 1)">+1 Point</button>
                <button onclick="addPoints('home', 2)">+2 Points</button>
                <button onclick="addPoints('home', 3)">+3 Points</button>
            </div>
       
            <div class="title">
                <h2>AWAY</h2>
                <p id="guest-score">0</p>
                <button onclick="addPoints('guest', 1)">+1 Point</button>
                <button onclick="addPoints('guest', 2)">+2 Points</button>
                <button onclick="addPoints('guest', 3)">+3 Points</button>
            </div>

        </div>
        <div>
            <button class="reset-btn" onclick="resetScores()">New Game</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
